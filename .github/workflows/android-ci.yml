name: Android CI

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Create placeholder launcher icons
        run: |
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/src/main/res/mipmap-$dpi
            cp app/src/main/res/drawable/ic_launcher_background.xml \
               app/src/main/res/mipmap-$dpi/ic_launcher.xml 2>/dev/null || \
            echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/white"/></adaptive-icon>' \
               > app/src/main/res/mipmap-$dpi/ic_launcher.xml
            cp app/src/main/res/mipmap-$dpi/ic_launcher.xml \
               app/src/main/res/mipmap-$dpi/ic_launcher_round.xml
          done

      - name: Create white color resource if missing
        run: |
          mkdir -p app/src/main/res/values
          if ! grep -q 'white' app/src/main/res/values/colors.xml 2>/dev/null; then
            echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="white">#FFFFFF</color></resources>' \
              > app/src/main/res/values/colors.xml
          fi

      - name: Install Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyPlanner-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
